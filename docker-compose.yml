version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: foodshare_mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password123
      MYSQL_DATABASE: food_sharing_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/1_schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/2_seed.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppassword123"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: foodshare_flask_api
    restart: always
    ports:
      - "5000:5000"
    environment:
      - USE_MYSQL=True
      - DB_USER=root
      - DB_PASSWORD=password123
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=food_sharing_db
      - JWT_SECRET_KEY=jwt-secret-key-prod-90238
      - SECRET_KEY=flask-secret-key-prod-89042
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: foodshare_react_web
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mysql_data:
